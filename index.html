<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <link rel="icon" href="favicon2-roxo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/style.css">
    
<!-- 
  - São invisíveis na tela, mas lidos por Google e redes sociais.
  - name="description": Define o texto que aparece no buscador. Sem ele, o Google "adivinha" e você perde cliques.
  - property="og:": (Open Graph) Cria a prévia com imagem/título ao colar o link no WhatsApp/Facebook. Sem ele, o link fica genérico e feio.
-->
    <meta name="description" content="Página criada para praticar e relembrar sobre Front">
    <meta property="og:title" content="Tecboard">
    <meta property="og:description" content="Praticar Front">
    <meta property="og:image" content="Aqui deveria ir uma imagem de preview">
    <meta property="og:url" content="Aqui deveria ir a url do site">

    
</head>
<body>
    
    <header>

        <image src="img/logo-tecboard-branco.png" alt="Logo da Tecboard, texto branco"></image>

    </header>

    <main>

        <section>
            <h1><span>Fique de olho</span>
                <br>no que importa</h1>

            <p>Monitoramento em tempo real com alertas inteligentes para sua aplicação nunca sair do ar sem você saber.</p>

            <button  href="/index.html" class="btn"" >Testar versão demo</button>

            <img src="img/celulares-sobrepostos-desktop.png" alt="Dois celulares pretos sobrepostos exibindo gráficos de monitoramento">
        </section>

    </main> 
    

</body>
</html>
